<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SzymonCzaplińskiUGC</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --white: #FAFAF8; --black: #111110; --accent: #C8A96E; --muted: #999894; --border: #E8E8E4; --card: #F3F3EF; }
    html { scroll-behavior: smooth; }
    body { background: var(--white); color: var(--black); font-family: 'DM Sans', sans-serif; font-weight: 300; overflow-x: hidden; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1.4rem 3rem; background: rgba(250,250,248,0.88); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--black); text-decoration: none; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-size: 0.82rem; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: var(--black); }
    .hero { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; padding-top: 5rem; }
    .hero-left { display: flex; flex-direction: column; justify-content: center; padding: 6rem 4rem 6rem 5rem; animation: fadeUp 1s ease both; }
    .hero-tag { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 1.6rem; }
    .hero-name { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 5vw, 5.5rem); line-height: 1.05; font-weight: 700; }
    .hero-name em { font-style: italic; font-weight: 400; color: var(--accent); }
    .hero-sub { font-size: 1rem; color: var(--muted); margin-top: 1.6rem; line-height: 1.7; }
    .hero-cta { display: inline-flex; align-items: center; margin-top: 2.8rem; padding: 0.9rem 2rem; background: var(--black); color: var(--white); font-size: 0.82rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; transition: background 0.2s; }
    .hero-cta:hover { background: var(--accent); }
    .hero-right { background: var(--card); display: flex; align-items: center; justify-content: center; position: relative; }
    .hero-visual { width: 260px; height: 380px; background: linear-gradient(135deg, #e8e4dc, #d6cfc4); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; box-shadow: 0 24px 60px rgba(0,0,0,0.12); position: relative; overflow: hidden; }
    .hero-photo-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; }
    .hero-avatar { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #a07840); display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 2.4rem; color: white; font-weight: 700; }
    .hero-card-name { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; }
    .hero-card-role { font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
    .hero-niches { display: flex; gap: 0.4rem; flex-wrap: wrap; justify-content: center; padding: 0 1.5rem; }
    .niche-tag { font-size: 0.65rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.3rem 0.7rem; background: white; color: var(--muted); border: 1px solid var(--border); }
    .photo-hint { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; text-align: center; padding: 0 1rem; }
    section { padding: 6rem 5rem; }
    .section-label { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; }
    .section-title { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 3vw, 2.8rem); font-weight: 700; line-height: 1.15; margin-bottom: 1.2rem; }
    .divider { width: 40px; height: 2px; background: var(--accent); margin-bottom: 2.4rem; }
    .bio-section { background: var(--white); display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; }
    .bio-text { font-size: 1.05rem; line-height: 1.85; color: #444; }
    .bio-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .stat-box { background: var(--card); padding: 2rem 1.6rem; border-left: 3px solid var(--accent); opacity: 0; transform: translateY(20px); transition: opacity 0.5s, transform 0.5s; }
    .stat-box.visible { opacity: 1; transform: none; }
    .stat-num { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 700; }
    .stat-label { font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-top: 0.5rem; }
    .videos-section { background: var(--card); }
    .videos-grid { display: flex; gap: 3rem; justify-content: center; flex-wrap: wrap; margin-top: 2rem; }
    .phone-mockup { width: 260px; background: #111; border-radius: 40px; padding: 14px; box-shadow: 0 0 0 2px #333, 0 30px 60px rgba(0,0,0,0.35); }
    .phone-mockup::before { content: ''; display: block; width: 80px; height: 20px; background: #222; border-radius: 0 0 14px 14px; margin: 0 auto 10px; }
    .phone-screen { border-radius: 28px; overflow: hidden; aspect-ratio: 9/16; background: #000; }
    .phone-screen iframe { width: 100%; height: 100%; border: none; display: block; }
